runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY

  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY

  - variable: GEMINI_MODEL
    value: gemini-3.1-pro-preview
